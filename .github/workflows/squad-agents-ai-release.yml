# Requires repo secret NUGET_API_KEY. Generate at nuget.org → API Keys → Create.
#
# ## Failure recovery
# The workflow resolves PACKAGE_VERSION once, builds/tests/packs exactly that version, and uploads
# nupkgs/* before attempting the registry write. If `dotnet pack` succeeds but `dotnet nuget push`
# fails partway, rerun the same workflow/version: NuGet keeps already-pushed packages immutable,
# `--skip-duplicate` makes duplicate pushes no-ops, and any not-yet-pushed package is retried.
# `cancel-in-progress: false` prevents a retry from canceling an in-flight publish for the same version.

name: Squad.Agents.AI NuGet Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet package version, for example 0.1.0-preview'
        required: true
        type: string
  push:
    tags:
      - 'squad-agents-ai-v*'

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve package version
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.version.outputs.package-version }}
    steps:
      - name: Resolve version from input or tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            package_version="${{ inputs.version }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            tag_prefix="squad-agents-ai-v"
            if [[ "${tag_name}" != ${tag_prefix}* ]]; then
              echo "::error::Expected tag to start with ${tag_prefix}; got ${tag_name}."
              exit 1
            fi
            package_version="${tag_name#${tag_prefix}}"
          fi

          if [[ -z "${package_version}" ]]; then
            echo "::error::PACKAGE_VERSION resolved to empty. Provide workflow_dispatch input 'version' or use tag squad-agents-ai-v<version>."
            exit 1
          fi

          if [[ ! "${package_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::PACKAGE_VERSION '${package_version}' is not a SemVer 2.0 version."
            exit 1
          fi

          echo "package-version=${package_version}" >> "${GITHUB_OUTPUT}"

  publish:
    name: Pack and publish NuGet package
    runs-on: ubuntu-latest
    needs: resolve-version
    concurrency:
      group: squad-agents-ai-release-${{ needs.resolve-version.outputs.package-version }}
      cancel-in-progress: false
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
      PACKAGE_VERSION: ${{ needs.resolve-version.outputs.package-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify NuGet API key
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${NUGET_API_KEY}" ]]; then
            echo "::error::Missing repo secret NUGET_API_KEY. Generate at nuget.org → API Keys → Create, then add it as a repository secret."
            exit 1
          fi

      - name: Restore package
        run: dotnet restore src/Squad.Agents.AI/Squad.Agents.AI.csproj

      - name: Restore tests
        run: dotnet restore test/Squad.Agents.AI.Tests/Squad.Agents.AI.Tests.csproj

      - name: Build package
        run: dotnet build src/Squad.Agents.AI/Squad.Agents.AI.csproj -c Release --no-restore -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Build tests
        run: dotnet build test/Squad.Agents.AI.Tests/Squad.Agents.AI.Tests.csproj -c Release --no-restore -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Test
        run: dotnet test test/Squad.Agents.AI.Tests/Squad.Agents.AI.Tests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/Squad.Agents.AI/Squad.Agents.AI.csproj -c Release --no-build -o nupkgs -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Upload NuGet package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: squad-agents-ai-nupkgs-${{ env.PACKAGE_VERSION }}
          path: nupkgs/*
          if-no-files-found: ignore

      - name: Push to NuGet.org
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "${NUGET_API_KEY}" --skip-duplicate

      - name: Prepare GitHub Release notes
        if: startsWith(github.ref, 'refs/tags/squad-agents-ai-v')
        shell: bash
        run: |
          set -euo pipefail

          awk -v version="${PACKAGE_VERSION}" '
            BEGIN { target = "## [" version "]"; in_section = 0; found = 0 }
            /^## / {
              if (in_section) { exit }
              if (index($0, target) == 1) { in_section = 1; found = 1; next }
            }
            in_section { print }
            END { if (!found) { exit 1 } }
          ' CHANGELOG.md > release-notes.md || \
          awk '
            /^## \[Unreleased\]/ { in_section = 1; found = 1; next }
            /^## / && in_section { exit }
            in_section { print }
            END { if (!found) { exit 1 } }
          ' CHANGELOG.md > release-notes.md || \
          printf 'Squad.Agents.AI %s\n' "${PACKAGE_VERSION}" > release-notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/squad-agents-ai-v')
        uses: softprops/action-gh-release@v2
        with:
          name: Squad.Agents.AI ${{ env.PACKAGE_VERSION }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: nupkgs/*.nupkg
