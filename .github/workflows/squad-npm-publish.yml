name: Squad npm Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.9.1)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
permissions:
  contents: read
  id-token: write
jobs:
  preflight:
    name: Pre-publish dependency validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Scan for file: references in package.json files"
        run: |
          echo "Scanning all packages/*/package.json for file: references..."
          FOUND=0
          for pkg in packages/*/package.json; do
            # Check dependencies, devDependencies, and optionalDependencies for file: refs
            MATCHES=$(node -e "
              const pkg = require('./$pkg');
              const sections = ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies'];
              for (const s of sections) {
                for (const [name, ver] of Object.entries(pkg[s] || {})) {
                  if (String(ver).startsWith('file:')) {
                    console.log('  ❌ ' + s + '.' + name + ' = ' + ver);
                  }
                }
              }
            ")
            if [ -n "$MATCHES" ]; then
              echo "::error::file: dependency found in $pkg"
              echo "$pkg:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "::error::PUBLISH BLOCKED — file: references break global installs (see v0.9.1 incident)"
            echo "Fix: Replace file: references with proper version ranges before publishing."
            exit 1
          fi
          echo "✅ No file: references found — safe to publish"
      # CI Hardening: Lockfile stability check (item 6)
      # Ensures workspace packages in package-lock.json resolve to local links,
      # not stale registry URLs. Catches lockfile drift before publish —
      # prevents v0.9.1-style incidents where stale entries break installs.
      - name: "🔒 Lockfile stability check"
        run: |
          echo "Validating package-lock.json hasn't drifted..."
          node -e "
            const fs = require('fs');
            const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
            const pkgs = lock.packages || {};
            const stale = Object.keys(pkgs).filter(k =>
              k.includes('node_modules/@bradygaster/squad-') &&
              pkgs[k].resolved && pkgs[k].resolved.startsWith('https://')
            );
            if (stale.length) {
              console.error('::error::LOCKFILE DRIFT DETECTED — workspace packages resolve to registry URLs instead of local links.');
              stale.forEach(k => console.error('  STALE: ' + k + ' → ' + pkgs[k].resolved));
              console.error('');
              console.error('Fix: Run npm install at the repo root to regenerate the lockfile.');
              process.exit(1);
            }
            const missingIntegrity = Object.keys(pkgs).filter(k =>
              k.includes('node_modules/@bradygaster/squad-') &&
              pkgs[k].resolved && pkgs[k].resolved.startsWith('https://') &&
              (!pkgs[k].integrity || !pkgs[k].integrity.startsWith('sha512-'))
            );
            if (missingIntegrity.length) {
              console.error('::error::MISSING INTEGRITY HASHES — workspace packages resolved from registry lack sha512 hashes:');
              missingIntegrity.forEach(k => console.error('  ' + k + ' (resolved: ' + pkgs[k].resolved + ')'));
              console.error('Fix: Run npm install at the repo root to regenerate the lockfile.');
              process.exit(1);
            }
            console.log('✅ Lockfile stable — all workspace packages resolve to local links');
          "
      - name: Validate semver versions
        run: |
          echo "Validating version numbers are valid semver..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            const semverRe = /^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$/;
            const pkgs = fs.readdirSync('packages', { withFileTypes: true })
              .filter(d => d.isDirectory())
              .map(d => path.join('packages', d.name, 'package.json'))
              .filter(p => fs.existsSync(p));
            let failed = false;
            for (const p of pkgs) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (!semverRe.test(pkg.version)) {
                console.error('::error::Invalid semver in ' + p + ': ' + pkg.version);
                failed = true;
              } else {
                console.log('✅ ' + pkg.name + '@' + pkg.version);
              }
            }
            if (failed) process.exit(1);
          "
  smoke-test:
    name: CLI packaging smoke test
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: |
          success=false
          for i in 1 2 3; do
            if npm ci; then
              success=true
              break
            fi
            echo "Retry $i/3 — npm ci failed, retrying in 5s..."
            sleep 5
          done
          if [ "$success" = false ]; then
            echo "::error::npm ci failed after 3 attempts"
            exit 1
          fi
      - name: Build
        run: npm run build
        env:
          SKIP_BUILD_BUMP: '1'
      - name: Validate npm pack succeeds
        run: |
          echo "Verifying npm pack produces valid tarballs..."
          npm -w packages/squad-sdk pack --dry-run
          npm -w packages/squad-cli pack --dry-run
          echo "✅ Both packages pack successfully"
      - name: Run CLI smoke tests
        run: npx vitest run test/cli-packaging-smoke.test.ts
  # CI Hardening: npm registry health check (item 10)
  # Verify the npm registry is reachable before starting any publish jobs.
  # Prevents wasted CI time and partial publishes when the registry is down.
  registry-check:
    name: npm registry health check
    needs: [preflight, smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: "🌐 Verify npm registry is reachable"
        run: |
          echo "Checking npm registry health before publish..."
          success=false
          for i in 1 2 3; do
            if npm ping 2>&1; then
              success=true
              break
            fi
            echo "Registry ping attempt $i/3 failed, retrying in 5s..."
            sleep 5
          done
          if [ "$success" = false ]; then
            echo "::error::npm registry is unreachable after 3 attempts — publish aborted"
            echo "::error::Check https://status.npmjs.org/ for registry status"
            exit 1
          fi
          echo "✅ npm registry is reachable"
          if ! npm view @bradygaster/squad-sdk version 2>/dev/null; then
            echo "::warning::Cannot verify @bradygaster/squad-sdk on registry — package may not exist yet or registry is degraded"
          else
            echo "✅ @bradygaster package namespace is accessible"
          fi
  publish-sdk:
    name: Publish @bradygaster/squad-sdk
    needs: [preflight, smoke-test, registry-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - name: Validate npm token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured — publish will fail"
            exit 1
          fi
          echo "✅ NPM_TOKEN is set"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"
      - name: Install dependencies
        run: |
          success=false
          for i in 1 2 3; do
            if npm ci; then
              success=true
              break
            fi
            echo "Retry $i/3 — npm ci failed, retrying in 5s..."
            sleep 5
          done
          if [ "$success" = false ]; then
            echo "::error::npm ci failed after 3 attempts"
            exit 1
          fi
      - name: Build squad-sdk
        run: npm -w packages/squad-sdk run build
      - name: Verify package version matches target
        run: |
          PKG_VERSION=$(node -p "require('./packages/squad-sdk/package.json').version")
          if [[ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "::error::Package version ($PKG_VERSION) does not match target version (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "Package version matches: $PKG_VERSION"
      - name: Publish squad-sdk to npm
        run: npm -w packages/squad-sdk publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Verify npm publication
        run: |
          for i in 1 2 3 4 5; do
            if npm view @bradygaster/squad-sdk@${{ steps.version.outputs.version }} version 2>/dev/null; then
              echo "Verified on npm registry"
              exit 0
            fi
            echo "Registry propagation attempt $i/5, waiting 15s..."
            sleep 15
          done
          echo "Registry propagation slow but package was published successfully"
  publish-cli:
    name: Publish @bradygaster/squad-cli
    needs: [preflight, smoke-test, registry-check, publish-sdk]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - name: Validate npm token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured — publish will fail"
            exit 1
          fi
          echo "✅ NPM_TOKEN is set"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"
      - name: Install dependencies
        run: |
          success=false
          for i in 1 2 3; do
            if npm ci; then
              success=true
              break
            fi
            echo "Retry $i/3 — npm ci failed, retrying in 5s..."
            sleep 5
          done
          if [ "$success" = false ]; then
            echo "::error::npm ci failed after 3 attempts"
            exit 1
          fi
      - name: "Guard against file: dependencies"
        run: |
          SDK_DEP=$(node -p "require('./packages/squad-cli/package.json').dependencies['@bradygaster/squad-sdk']")
          if [[ "$SDK_DEP" == file:* ]]; then
            echo "::error::squad-cli has file: dependency on squad-sdk — this breaks global installs"
            exit 1
          fi
          echo "SDK dependency is safe: $SDK_DEP"
      - name: Build squad-sdk (required for CLI project references)
        run: npm -w packages/squad-sdk run build
      - name: Build squad-cli
        run: npm -w packages/squad-cli run build
      - name: Verify package version matches target
        run: |
          PKG_VERSION=$(node -p "require('./packages/squad-cli/package.json').version")
          if [[ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "::error::Package version ($PKG_VERSION) does not match target version (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "Package version matches: $PKG_VERSION"
      - name: Publish squad-cli to npm
        run: npm -w packages/squad-cli publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Verify npm publication
        run: |
          for i in 1 2 3 4 5; do
            if npm view @bradygaster/squad-cli@${{ steps.version.outputs.version }} version 2>/dev/null; then
              echo "Verified on npm registry"
              exit 0
            fi
            echo "Registry propagation attempt $i/5, waiting 15s..."
            sleep 15
          done
          echo "Registry propagation slow but package was published successfully"
