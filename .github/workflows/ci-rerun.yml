name: CI Rerun (Manual)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test'
        required: true
        type: string

permissions:
  contents: read
  statuses: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }})
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          HEAD_REPO=$(echo "$PR_DATA" | jq -r '.head.repo.full_name')
          BASE_REF=$(echo "$PR_DATA" | jq -r '.base.ref')
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "Testing PR #${{ inputs.pr_number }}: $HEAD_REPO/$HEAD_REF → $BASE_REF (SHA: $HEAD_SHA)"

      - name: Set pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.head_sha }} \
            --method POST \
            --field state=pending \
            --field context="Squad CI / rerun" \
            --field description="Running CI rerun..." \
            --field target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.base_ref }}
          fetch-depth: 0

      - name: Fetch and merge PR head
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin pull/${{ inputs.pr_number }}/head:pr-head
          git merge pr-head --no-edit || {
            echo "::error::Merge conflict — PR cannot be cleanly merged into ${{ steps.pr.outputs.base_ref }}"
            exit 1
          }

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (with lockfile auto-fix)
        run: |
          STALE=$(node -e "
            const lock = require('./package-lock.json');
            const pkgs = lock.packages || {};
            const stale = Object.keys(pkgs).filter(k =>
              k.includes('/node_modules/@bradygaster/squad-') &&
              pkgs[k].resolved && pkgs[k].resolved.startsWith('https://')
            );
            if (stale.length) { console.log('found'); } else { console.log('clean'); }
          ")
          if [ "$STALE" = "found" ]; then
            echo "::warning::Stale workspace entries in lockfile — using npm install to auto-fix"
            npm install
          else
            npm ci
          fi

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Set success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.head_sha }} \
            --method POST \
            --field state=success \
            --field context="Squad CI / rerun" \
            --field description="All checks passed" \
            --field target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Set failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.head_sha }} \
            --method POST \
            --field state=failure \
            --field context="Squad CI / rerun" \
            --field description="CI rerun failed — check logs" \
            --field target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
