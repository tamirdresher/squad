name: Publish Insider to npm

on:
  push:
    branches:
      - insider

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      # CI Hardening: Composite action replaces duplicated setup-node + retry
      # pattern (item 7). See .github/actions/setup-squad-node/action.yml.
      - uses: ./.github/actions/setup-squad-node
        with:
          node-version: ${{ matrix.node-version }}
          install-command: 'install'

      - name: Fix platform-specific rollup bindings
        run: npm install @rollup/rollup-linux-x64-gnu --no-save || true

      - name: Build
        run: |
          rm -rf packages/squad-cli/node_modules/@bradygaster/squad-sdk
          npm run build

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-squad-node
        with:
          node-version: ${{ matrix.node-version }}
          install-command: 'install'

      - name: Fix platform-specific rollup bindings
        run: npm install @rollup/rollup-linux-x64-gnu --no-save || true

      - name: Build (required for subpath export resolution)
        run: |
          rm -rf packages/squad-cli/node_modules/@bradygaster/squad-sdk
          npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install docs dependencies
        run: npm --prefix docs install

      - name: Run tests
        run: npm test

  # CI Hardening: npm registry health check (item 10)
  # Fail early if registry is unreachable instead of failing mid-publish.
  registry-check:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: "🌐 Verify npm registry is reachable"
        run: |
          echo "Checking npm registry health before insider publish..."
          success=false
          for i in 1 2 3; do
            if npm ping 2>&1; then
              success=true
              break
            fi
            echo "Registry ping attempt $i/3 failed, retrying in 5s..."
            sleep 5
          done
          if [ "$success" = false ]; then
            echo "::error::npm registry is unreachable after 3 attempts — publish aborted"
            echo "::error::Check https://status.npmjs.org/ for registry status"
            exit 1
          fi
          echo "✅ npm registry is reachable"
          if ! npm view @bradygaster/squad-sdk version 2>/dev/null; then
            echo "::warning::Cannot verify @bradygaster/squad-sdk on registry — package may not exist yet or registry is degraded"
          else
            echo "✅ @bradygaster package namespace is accessible"
          fi

  publish:
    needs: [test, registry-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-squad-node
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          install-command: 'install'

      - name: Fix platform-specific rollup bindings
        run: npm install @rollup/rollup-linux-x64-gnu --no-save || true

      - name: Validate npm token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured — publish will fail"
            exit 1
          fi
          echo "✅ NPM_TOKEN is set"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build packages
        run: |
          rm -rf packages/squad-cli/node_modules/@bradygaster/squad-sdk
          npm -w packages/squad-sdk run build && npm -w packages/squad-cli run build

      - name: Publish squad-sdk with insider tag
        run: npm -w packages/squad-sdk publish --tag insider --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish squad-cli with insider tag
        run: npm -w packages/squad-cli publish --tag insider --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
