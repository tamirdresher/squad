<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 Personal Agent</title>
<!-- Inter font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        accent: { DEFAULT: '#7c3aed', light: '#a78bfa', dark: '#6d28d9' },
        copilot: { from: '#7c3aed', via: '#2563eb', to: '#06b6d4' },
        surface: {
          light: '#fafafa', dark: '#0c0c0c',
          sidebar: { light: '#f5f5f5', dark: '#0a0a0a' },
          input: { light: '#ffffff', dark: '#161616' },
          hover: { light: '#ececec', dark: '#1e1e1e' },
        },
        border: { light: '#e5e5e5', dark: '#222222' },
      },
      fontFamily: {
        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
        mono: ['"JetBrains Mono"', '"SF Mono"', '"Fira Code"', 'Consolas', 'monospace'],
      },
    }
  }
}
</script>
<!-- marked.js for Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<!-- Highlight.js for syntax highlighting -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github-dark.min.css" id="hljs-dark-theme">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github.min.css" id="hljs-light-theme" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
<!-- DOMPurify for XSS sanitization -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
<style>
  /* Blinking cursor for streaming */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .streaming-cursor::after { content:'▋'; animation: blink 1s step-end infinite; color: #7c3aed; }

  /* Copilot-style gradient animation */
  @keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .gradient-text { background: linear-gradient(135deg, #7c3aed, #2563eb, #06b6d4, #7c3aed); background-size: 300% 300%; animation: gradient-shift 6s ease infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .gradient-border { background: linear-gradient(135deg, #7c3aed33, #2563eb22, #06b6d422); }
  .gradient-glow { box-shadow: 0 0 60px rgba(124, 58, 237, 0.08), 0 0 120px rgba(37, 99, 235, 0.04); }

  /* Animated logo */
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes pulse-ring { 0%{transform:scale(1);opacity:0.4} 100%{transform:scale(1.8);opacity:0} }
  .logo-float { animation: float 4s ease-in-out infinite; }
  .logo-ring { animation: pulse-ring 3s ease-out infinite; }

  /* Suggestion chips */
  .chip { transition: all 0.2s; border: 1px solid transparent; }
  .chip:hover { border-color: #7c3aed44; background: linear-gradient(135deg, #7c3aed08, #2563eb08); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124, 58, 237, 0.1); }

  /* Markdown prose overrides */
  .prose pre { position: relative; }
  .prose table { border-collapse: collapse; width: 100%; }
  .prose th, .prose td { border: 1px solid; padding: 0.5rem 0.75rem; text-align: left; }
  .dark .prose th, .dark .prose td { border-color: #222; }
  .prose th, .prose td { border-color: #e5e5e5; }
  .prose img { max-width: 100%; border-radius: 0.5rem; }

  /* Code block wrapper */
  .code-block-wrapper { position: relative; border-radius: 0.75rem; overflow: hidden; margin: 0.75rem 0; }
  .code-block-header { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0.75rem; font-size: 0.75rem; }
  .code-block-wrapper pre { margin: 0 !important; border-radius: 0 !important; }
  .code-block-wrapper code { font-size: 0.82rem !important; }

  /* HTML preview iframe */
  .html-preview-frame { border: 1px solid; border-radius: 0.5rem; width: 100%; min-height: 120px; max-height: 500px; background: white; }

  /* Sidebar transition */
  .sidebar-overlay { transition: opacity 0.2s; }
  .sidebar-slide { transition: transform 0.2s; }

  /* Glassmorphism input */
  .glass-input { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: rgba(255,255,255,0.8); }
  .dark .glass-input { background: rgba(22,22,22,0.85); }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #6b728040; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

  /* Message entrance animation */
  @keyframes msg-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-animate { animation: msg-in 0.3s ease-out; }
</style>
</head>
<body class="h-full bg-surface-light dark:bg-surface-dark text-gray-800 dark:text-gray-200 font-sans antialiased">
<div class="flex h-full overflow-hidden">

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar-slide fixed md:relative z-40 w-72 h-full flex flex-col bg-surface-sidebar-light dark:bg-surface-sidebar-dark border-r border-border-light dark:border-border-dark -translate-x-full md:translate-x-0 flex-shrink-0">
    <!-- Header -->
    <div class="p-4 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-purple-600 via-blue-500 to-cyan-400 flex items-center justify-center text-white text-sm font-bold shadow-lg shadow-purple-500/20">✦</div>
        <div>
          <h1 class="text-sm font-bold gradient-text">Personal Agent</h1>
          <p class="text-[0.65rem] text-gray-400 mt-0">Powered by ADC</p>
        </div>
      </div>
      <button onclick="toggleSidebar()" class="md:hidden p-1 rounded hover:bg-surface-hover-light dark:hover:bg-surface-hover-dark">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- New chat + model selector -->
    <div class="px-3 space-y-2">
      <button onclick="newChat()" class="w-full px-4 py-2.5 bg-gradient-to-r from-purple-600 via-blue-500 to-cyan-500 rounded-xl text-sm font-medium text-white hover:opacity-90 transition-all shadow-md shadow-purple-500/20 flex items-center justify-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        New Chat
      </button>
      <select id="model-sel" onchange="currentModel=this.value;localStorage.setItem('pa-model',this.value)" class="w-full px-3 py-2 text-xs border border-border-light dark:border-border-dark rounded-lg bg-surface-sidebar-light dark:bg-surface-sidebar-dark text-gray-600 dark:text-gray-400 cursor-pointer focus:outline-none focus:border-accent">
      </select>
    </div>

    <!-- Search -->
    <div class="px-3 mt-2">
      <button onclick="openSkillsPanel()" class="w-full px-3 py-2 text-xs border border-border-light dark:border-border-dark rounded-lg bg-white dark:bg-surface-input-dark text-gray-500 dark:text-gray-400 hover:border-accent hover:text-accent transition-colors flex items-center justify-between">
        <span class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
          Skills
        </span>
        <span id="skills-badge" class="text-[0.62rem] bg-accent/10 text-accent px-1.5 py-0.5 rounded-full font-medium">0</span>
      </button>
    </div>
    <div class="px-3 mt-2">
      <input id="chat-search" type="text" placeholder="Search chats..." oninput="filterChats(this.value)" class="w-full px-3 py-1.5 text-xs border border-border-light dark:border-border-dark rounded-lg bg-white dark:bg-surface-input-dark placeholder-gray-400 focus:outline-none focus:border-accent">
    </div>

    <!-- Chat list -->
    <div id="chats" class="flex-1 overflow-y-auto px-2 mt-2 space-y-0.5"></div>

    <!-- Footer -->
    <div class="p-3 border-t border-border-light dark:border-border-dark flex items-center justify-between">
      <span id="foot" class="text-[0.68rem] text-gray-400">Loading...</span>
      <button onclick="toggleTheme()" id="theme-btn" class="p-1.5 rounded-lg hover:bg-surface-hover-light dark:hover:bg-surface-hover-dark transition-colors" title="Toggle theme">
        <svg id="theme-icon-light" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg id="theme-icon-dark" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 flex flex-col min-w-0">
    <!-- Top bar (mobile) -->
    <div class="md:hidden flex items-center gap-3 px-4 py-3 border-b border-border-light dark:border-border-dark">
      <button onclick="toggleSidebar()" class="p-1 rounded hover:bg-surface-hover-light dark:hover:bg-surface-hover-dark">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="text-sm font-semibold gradient-text">Personal Agent</span>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto">
      <div class="max-w-3xl mx-auto px-4 sm:px-6 py-6 space-y-6">
        <!-- Welcome Screen (Copilot-style) -->
        <div id="welcome-screen" class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
          <!-- Animated logo -->
          <div class="relative mb-8 logo-float">
            <div class="absolute inset-0 rounded-full bg-gradient-to-br from-purple-500 via-blue-500 to-cyan-400 opacity-20 blur-2xl logo-ring"></div>
            <div class="relative w-20 h-20 rounded-2xl bg-gradient-to-br from-purple-600 via-blue-500 to-cyan-400 flex items-center justify-center text-white text-3xl shadow-2xl shadow-purple-500/30">✦</div>
          </div>
          <!-- Greeting -->
          <h2 class="text-3xl sm:text-4xl font-bold mb-3">
            <span class="gradient-text">Personal Agent</span>
          </h2>
          <p class="text-gray-400 dark:text-gray-500 text-sm sm:text-base max-w-md mb-8">Your AI companion in a secure sandbox — email, calendar, code, and more.</p>
          <!-- Suggestion chips -->
          <div class="flex flex-wrap justify-center gap-2 max-w-lg">
            <button onclick="useSuggestion('What unread emails do I have?')" class="chip px-4 py-2.5 rounded-xl bg-white dark:bg-surface-input-dark text-xs text-gray-600 dark:text-gray-300 shadow-sm">
              📧 Check my emails
            </button>
            <button onclick="useSuggestion('What meetings do I have today?')" class="chip px-4 py-2.5 rounded-xl bg-white dark:bg-surface-input-dark text-xs text-gray-600 dark:text-gray-300 shadow-sm">
              📅 Today's meetings
            </button>
            <button onclick="useSuggestion('Summarize key decisions from our team discussions')" class="chip px-4 py-2.5 rounded-xl bg-white dark:bg-surface-input-dark text-xs text-gray-600 dark:text-gray-300 shadow-sm">
              💡 Ask M365 Copilot
            </button>
            <button onclick="useSuggestion('Create a Python script that fetches data from an API')" class="chip px-4 py-2.5 rounded-xl bg-white dark:bg-surface-input-dark text-xs text-gray-600 dark:text-gray-300 shadow-sm">
              🧑‍💻 Write some code
            </button>
            <button onclick="useSuggestion('Every weekday at 9am, summarize my inbox')" class="chip px-4 py-2.5 rounded-xl bg-white dark:bg-surface-input-dark text-xs text-gray-600 dark:text-gray-300 shadow-sm">
              ⏰ Set up a cron job
            </button>
            <button onclick="useSuggestion('Create a new sandbox and deploy a React app')" class="chip px-4 py-2.5 rounded-xl bg-white dark:bg-surface-input-dark text-xs text-gray-600 dark:text-gray-300 shadow-sm">
              🚀 Deploy an app
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="px-4 sm:px-6 py-4">
      <div class="max-w-3xl mx-auto">
        <div class="flex gap-2 items-end glass-input rounded-2xl border border-border-light dark:border-border-dark p-2 gradient-glow">
          <textarea id="input" placeholder="Ask me anything…" rows="1"
            class="flex-1 px-3 py-2.5 bg-transparent text-sm font-normal placeholder-gray-400 focus:outline-none resize-none min-h-[44px] max-h-[160px] leading-relaxed"></textarea>
          <button id="send-btn" onclick="send()"
            class="px-4 py-2.5 bg-gradient-to-r from-purple-600 to-blue-500 hover:from-purple-700 hover:to-blue-600 text-white rounded-xl font-semibold text-sm transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1.5 shadow-md shadow-purple-500/20">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m-7 7l7-7 7 7"/></svg>
          </button>
          <button id="stop-btn" onclick="stopStream()" style="display:none"
            class="px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-xl font-semibold text-sm transition-all flex items-center gap-1.5 shadow-md shadow-red-500/20">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            Stop
          </button>
        </div>
        <div id="status" class="text-[0.68rem] text-gray-400 mt-1.5 px-1 text-center"></div>
      </div>
    </div>
  </main>

  <!-- Right Panel: Skills & MCPs -->
  <aside id="right-panel" class="hidden lg:flex w-64 h-full flex-col bg-surface-sidebar-light dark:bg-surface-sidebar-dark border-l border-border-light dark:border-border-dark flex-shrink-0 overflow-hidden">
    <!-- MCP Servers -->
    <div class="p-3 border-b border-border-light dark:border-border-dark">
      <div class="flex items-center justify-between mb-2">
        <div class="text-[0.68rem] font-semibold text-gray-400 uppercase tracking-wider">MCP Servers</div>
        <button onclick="openSkillsPanel('mcps')" class="text-[0.6rem] text-accent hover:underline">Manage</button>
      </div>
      <div id="mcp-list" class="space-y-1"></div>
    </div>

    <!-- Skills -->
    <div class="p-3 border-b border-border-light dark:border-border-dark">
      <div class="flex items-center justify-between mb-2">
        <div class="text-[0.68rem] font-semibold text-gray-400 uppercase tracking-wider">Skills</div>
        <button onclick="openSkillsPanel('skills')" class="text-[0.6rem] text-accent hover:underline">Manage</button>
      </div>
      <div id="skills-list" class="space-y-1"></div>
    </div>

    <!-- Activity log (bottom) -->
    <div class="mt-auto p-3 border-t border-border-light dark:border-border-dark flex flex-col min-h-0">
      <div class="flex items-center justify-between mb-2">
        <div class="text-[0.68rem] font-semibold text-gray-400 uppercase tracking-wider">Activity</div>
        <button onclick="clearActivity()" class="text-[0.6rem] text-gray-400 hover:text-red-400 transition-colors">Clear</button>
      </div>
      <div id="activity-log" class="space-y-1 overflow-y-auto flex-1" style="max-height:220px">
        <div class="text-[0.65rem] text-gray-400 italic">No activity yet</div>
      </div>
    </div>
  </aside>
</div>

<!-- Skills Modal -->
<div id="skills-modal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/50" onclick="closeSkillsPanel()"></div>
  <div class="absolute inset-4 sm:inset-8 md:inset-y-8 md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[680px] bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-2xl shadow-2xl flex flex-col overflow-hidden">
    <!-- Modal header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-border-light dark:border-border-dark">
      <h2 class="text-base font-semibold flex items-center gap-2">
        <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        Skills
      </h2>
      <button onclick="closeSkillsPanel()" class="p-1.5 rounded-lg hover:bg-surface-hover-light dark:hover:bg-surface-hover-dark">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Modal body -->
    <div id="skills-panel-body" class="flex-1 overflow-y-auto p-5">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<script>
// ── State ──
var msgsContainer = document.getElementById("messages");
var msgsInner = msgsContainer.querySelector(".max-w-3xl");
var input = document.getElementById("input");
var sendBtn = document.getElementById("send-btn");
var stopBtn = document.getElementById("stop-btn");
var currentSession = localStorage.getItem("pa-session");
var currentModel = localStorage.getItem("pa-model") || "claude-opus-4.6";
var allSessions = [];
var isStreaming = false;
var streamReader = null;  // active ReadableStream reader for cancellation
var streamAbortController = null;  // AbortController for fetch

// ── Theme ──
function initTheme() {
  var saved = localStorage.getItem("pa-theme");
  if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
    document.documentElement.classList.add("dark");
  }
  updateThemeIcons();
}
function toggleTheme() {
  document.documentElement.classList.toggle("dark");
  var isDark = document.documentElement.classList.contains("dark");
  localStorage.setItem("pa-theme", isDark ? "dark" : "light");
  updateThemeIcons();
  // Switch hljs theme
  document.getElementById("hljs-dark-theme").disabled = !isDark;
  document.getElementById("hljs-light-theme").disabled = isDark;
}
function updateThemeIcons() {
  var isDark = document.documentElement.classList.contains("dark");
  document.getElementById("theme-icon-light").classList.toggle("hidden", isDark);
  document.getElementById("theme-icon-dark").classList.toggle("hidden", !isDark);
}
initTheme();

// ── Sidebar toggle (mobile) ──
function toggleSidebar() {
  var sidebar = document.getElementById("sidebar");
  var overlay = document.getElementById("sidebar-overlay");
  var isOpen = !sidebar.classList.contains("-translate-x-full");
  if (isOpen) {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
  } else {
    sidebar.classList.remove("-translate-x-full");
    overlay.classList.remove("hidden");
  }
}

// ── Input auto-resize ──
input.addEventListener("input", function() { this.style.height = "44px"; this.style.height = Math.min(this.scrollHeight, 160) + "px"; });
input.addEventListener("keydown", function(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });

// ── Markdown rendering ──
var markedRenderer = new marked.Renderer();
markedRenderer.code = function(obj) {
  var code = obj.text;
  var lang = obj.lang || "";
  var highlighted;
  try {
    highlighted = lang && hljs.getLanguage(lang) ? hljs.highlight(code, { language: lang }).value : hljs.highlightAuto(code).value;
  } catch(e) { highlighted = escHtml(code); }
  var langLabel = lang ? lang.toUpperCase() : "CODE";
  var escapedCode = code.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
  var isHtml = lang.toLowerCase() === "html";
  var previewBtn = isHtml ? '<button onclick="toggleHtmlPreview(this)" class="text-[0.68rem] px-2 py-0.5 rounded bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30 transition-colors">▶ Preview</button>' : '';
  return '<div class="code-block-wrapper bg-gray-900 dark:bg-gray-950 border border-gray-700 dark:border-gray-800">'
    + '<div class="code-block-header bg-gray-800 dark:bg-gray-900 text-gray-400 border-b border-gray-700 dark:border-gray-800">'
    + '<span class="font-mono">' + langLabel + '</span>'
    + '<div class="flex items-center gap-2">' + previewBtn
    + '<button onclick="copyCode(this)" data-code="' + escapedCode + '" class="text-[0.68rem] px-2 py-0.5 rounded bg-gray-700 hover:bg-gray-600 text-gray-300 transition-colors">Copy</button>'
    + '</div></div>'
    + '<pre class="!bg-gray-900 dark:!bg-gray-950 p-4 overflow-x-auto"><code class="hljs language-' + lang + '">' + highlighted + '</code></pre>'
    + '</div>';
};
marked.setOptions({ renderer: markedRenderer, breaks: true, gfm: true });

function renderMarkdown(text) {
  var raw = marked.parse(text || "");
  return DOMPurify.sanitize(raw, { ADD_TAGS: ["iframe"], ADD_ATTR: ["srcdoc", "sandbox", "allow", "frameborder", "loading"] });
}

// ── Code copy ──
function copyCode(btn) {
  var code = btn.getAttribute("data-code").replace(/&#39;/g, "'").replace(/&quot;/g, '"');
  navigator.clipboard.writeText(code).then(function() {
    btn.textContent = "Copied!";
    setTimeout(function() { btn.textContent = "Copy"; }, 1500);
  });
}

// ── Helpers ──
function escHtml(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
function escAttr(s) { return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function relativeTime(iso) {
  if (!iso) return "";
  var diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  if (diff < 172800) return "yesterday";
  return Math.floor(diff / 86400) + "d ago";
}
function dateGroup(iso) {
  if (!iso) return "Older";
  var now = new Date(), d = new Date(iso);
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var yesterday = new Date(today.getTime() - 86400000);
  if (d >= today) return "Today";
  if (d >= yesterday) return "Yesterday";
  return "Older";
}

        + '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>'

        + '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>'

// ── Send message (streaming) ──
function showStopBtn() { sendBtn.style.display = "none"; stopBtn.style.display = "flex"; }
function showSendBtn() { stopBtn.style.display = "none"; sendBtn.style.display = "flex"; sendBtn.disabled = false; }

function send() {
  var text = input.value.trim();
  if (!text || isStreaming) return;
  input.value = ""; input.style.height = "48px"; isStreaming = true;
  showStopBtn();

  // Hide welcome screen on first message
  var welcomeEl = document.getElementById("welcome-screen");
  if (welcomeEl) welcomeEl.remove();

  addMsg("user", escHtml(text));

  currentModel = document.getElementById("model-sel").value;
  localStorage.setItem("pa-model", currentModel);

  // Create assistant message placeholder
  var assistantEl = addMsg("assistant", "");
  var bodyEl = assistantEl.querySelector(".prose");
  bodyEl.classList.add("streaming-cursor");
  document.getElementById("status").textContent = "Model: " + currentModel + " · Streaming…";

  var fullReply = "";
  var renderTimer = null;
  var finished = false; // guard against double-finish

  streamAbortController = new AbortController();

  fetch("/api/chat/stream", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text, sessionId: currentSession, model: currentModel }),
    signal: streamAbortController.signal
  }).then(function(response) {
    if (!response.ok) throw new Error("HTTP " + response.status);
    streamReader = response.body.getReader();
    var decoder = new TextDecoder();
    var buffer = "";

    function processChunk() {
      if (finished) return;
      streamReader.read().then(function(result) {
        if (result.done) { finishStream(); return; }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split("\n");
        buffer = lines.pop() || "";

        lines.forEach(function(line) {
          if (!line.startsWith("data: ")) return;
          try {
            var data = JSON.parse(line.slice(6));
            if (data.type === "delta") {
              fullReply += data.content;
              // Debounced render for performance
              if (!renderTimer) {
                renderTimer = setTimeout(function() {
                  bodyEl.innerHTML = renderMarkdown(fullReply);
                  bodyEl.classList.add("streaming-cursor");
                  scrollToBottom();
                  renderTimer = null;
                }, 50);
              }
            } else if (data.type === "start") {
              if (data.sessionId) { currentSession = data.sessionId; localStorage.setItem("pa-session", data.sessionId); }
            } else if (data.type === "tool_start") {
              addActivity("tool", data.toolName, data.mcpServer);
            } else if (data.type === "skill_invoked") {
              addActivity("skill", data.name);
            } else if (data.type === "done") {
              finishStream(data);
            } else if (data.type === "error") {
              bodyEl.innerHTML = '<p class="text-red-500">Error: ' + escHtml(data.error) + '</p>';
              finishStream(data);
            }
          } catch(e) {}
        });
        if (!finished) processChunk();
      }).catch(function(e) {
        if (e.name === "AbortError") { finishStream(); return; }
        bodyEl.innerHTML = '<p class="text-red-500">Stream error: ' + escHtml(e.message) + '</p>';
        finishStream();
      });
    }

    function finishStream(data) {
      if (finished) return;
      finished = true;
      clearTimeout(renderTimer);
      bodyEl.innerHTML = renderMarkdown(fullReply || "(no response)");
      bodyEl.classList.remove("streaming-cursor");
      isStreaming = false; streamReader = null; streamAbortController = null;
      showSendBtn(); input.focus();
      scrollToBottom();
      var sid = (data && data.sessionId) || currentSession || "";
      var mod = (data && data.model) || currentModel;
      document.getElementById("status").textContent = "Session: " + sid.slice(0, 8) + " · Model: " + mod;
      loadChats();
    }

    processChunk();
  }).catch(function(e) {
    if (finished) return;
    if (e.name === "AbortError") {
      // User stopped — render what we have
      finished = true;
      clearTimeout(renderTimer);
      bodyEl.innerHTML = renderMarkdown(fullReply || "(stopped)");
      bodyEl.classList.remove("streaming-cursor");
      isStreaming = false; streamReader = null; streamAbortController = null;
      showSendBtn(); input.focus(); scrollToBottom(); loadChats();
      document.getElementById("status").textContent = "Stopped · Model: " + currentModel;
      return;
    }
    // Fallback to batch mode
    bodyEl.innerHTML = '<p class="text-gray-400 text-sm italic">Streaming unavailable, trying batch…</p>';
    fetch("/api/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, sessionId: currentSession, model: currentModel })
    }).then(function(r) { return r.json(); }).then(function(d) {
      finished = true;
      bodyEl.innerHTML = renderMarkdown(d.reply || d.error || "No response");
      bodyEl.classList.remove("streaming-cursor");
      if (d.sessionId) { currentSession = d.sessionId; localStorage.setItem("pa-session", d.sessionId); }
      document.getElementById("status").textContent = "Session: " + (d.sessionId || "").slice(0, 8) + " · Model: " + (d.model || currentModel);
      isStreaming = false; showSendBtn(); input.focus();
      scrollToBottom(); loadChats();
    }).catch(function(e2) {
      finished = true;
      bodyEl.innerHTML = '<p class="text-red-500">Error: ' + escHtml(e2.message) + '</p>';
      bodyEl.classList.remove("streaming-cursor");
      isStreaming = false; showSendBtn();
    });
  });
}

// ── Stop streaming ──
function stopStream() {
  // 1. Abort the client-side fetch
  if (streamAbortController) {
    streamAbortController.abort();
    streamAbortController = null;
  }
  // 2. Cancel the reader
  if (streamReader) {
    try { streamReader.cancel(); } catch(e) {}
    streamReader = null;
  }
  // 3. Tell server to stop the SDK session
  if (currentSession) {
    fetch("/api/chat/stop", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId: currentSession })
    }).catch(function() {});
  }
}

// ── Activity Log ──
var activityItems = [];
function addActivity(kind, name, mcpServer) {
  var time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  var icon, label, cls;
  if (kind === "tool") {
    icon = "⚡"; cls = "text-amber-500";
    label = mcpServer ? name + " <span class='text-gray-400'>via " + escHtml(mcpServer) + "</span>" : escHtml(name);
  } else if (kind === "skill") {
    icon = "💡"; cls = "text-purple-500";
    label = escHtml(name);
  } else {
    icon = "●"; cls = "text-gray-400";
    label = escHtml(name);
  }
  activityItems.unshift({ icon: icon, label: label, time: time, cls: cls });
  if (activityItems.length > 20) activityItems.pop();
  renderActivityLog();
  // Flash the right panel item
  highlightRightPanelItem(kind, name, mcpServer);
}

function renderActivityLog() {
  var el = document.getElementById("activity-log");
  if (!el) return;
  if (activityItems.length === 0) {
    el.innerHTML = '<div class="text-[0.65rem] text-gray-400 italic">No activity yet</div>';
    return;
  }
  el.innerHTML = activityItems.map(function(a) {
    return '<div class="flex items-center gap-1.5 text-[0.65rem] ' + a.cls + '">'
      + '<span>' + a.icon + '</span>'
      + '<span class="flex-1 truncate">' + a.label + '</span>'
      + '<span class="text-gray-400 flex-shrink-0">' + a.time + '</span>'
      + '</div>';
  }).join("");
}

function clearActivity() {
  activityItems = [];
  renderActivityLog();
}

function highlightRightPanelItem(kind, name, mcpServer) {

  el.classList.add("ring-2", "ring-accent/50");

}

      + '<input id="mcp-add-url" type="text" placeholder="URL (e.g., https://mcp.example.com/mcp)" class="flex-1 px-3 py-2 text-xs border border-border-light dark:border-border-dark rounded-lg bg-white dark:bg-surface-input-dark placeholder-gray-400 focus:outline-none focus:border-accent font-mono">'
      + '<select id="mcp-add-type" class="px-2 py-2 text-xs border border-border-light dark:border-border-dark rounded-lg bg-white dark:bg-surface-input-dark focus:outline-none focus:border-accent"><option value="http">HTTP</option><option value="sse">SSE</option></select>'
      + '<button onclick="addMcp()" class="px-3 py-2 bg-accent text-white text-xs font-medium rounded-lg hover:bg-accent-dark transition-colors">Add</button>'
      + '</div>'
      + '<div id="mcp-add-status" class="text-[0.68rem] text-gray-400"></div>'
      + '</div></div>';

    // List MCPs
    html += '<div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Connected Servers (' + mcps.length + ')</div>';
    mcps.forEach(function(m) {
      html += '<div class="flex items-center gap-3 p-3 rounded-xl border border-border-light dark:border-border-dark mb-2 group hover:border-accent/30 transition-colors">'
        + '<span class="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0"></span>'
        + '<div class="flex-1 min-w-0">'
        + '<div class="flex items-center gap-2">'
        + '<span class="text-sm font-medium">' + escHtml(m.name) + '</span>'
        + (m.builtin ? '<span class="text-[0.6rem] px-1.5 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-400 font-medium">built-in</span>' : '')
        + '</div>'
        + '<div class="text-[0.68rem] text-gray-400 truncate font-mono mt-0.5">' + escHtml(m.url) + '</div>'
        + '</div>'
        + (m.builtin ? '' : '<button onclick="deleteMcp(\'' + escAttr(m.name) + '\')" class="p-1.5 rounded-lg opacity-0 group-hover:opacity-100 hover:bg-red-100 dark:hover:bg-red-900/30 text-gray-400 hover:text-red-500 transition-all" title="Remove"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>')
        + '</div>';
    });

    body.innerHTML = html;
  });
}

function addMcp() {
  var name = document.getElementById("mcp-add-name").value.trim();
  var url = document.getElementById("mcp-add-url").value.trim();
  var type = document.getElementById("mcp-add-type").value;
  var status = document.getElementById("mcp-add-status");
  if (!name || !url) { status.textContent = "Name and URL required"; status.className = "text-[0.68rem] text-red-500"; return; }
  fetch("/api/mcps", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: name, url: url, type: type })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.error) { status.textContent = "Error: " + d.error; status.className = "text-[0.68rem] text-red-500"; }
    else { status.textContent = "✓ Added!"; status.className = "text-[0.68rem] text-emerald-500"; renderSkillsPanel(); }
  });
}

function deleteMcp(name) {
  if (!confirm("Remove MCP server '" + name + "'?")) return;
  fetch("/api/mcps/" + name, { method: "DELETE" }).then(function() { renderSkillsPanel(); });
}

function renderSkillsTab(body, tabHtml) {
  fetch("/api/skills").then(function(r) { return r.json(); }).then(function(skills) {
    var html = tabHtml;

    // Install from community
    html += '<div class="mb-5">'
      + '<div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Install from Community</div>'
      + '<div class="text-[0.68rem] text-gray-400 mb-2">Paste the full install command. Browse skills at <a href="https://skills.sh" target="_blank" class="text-accent hover:underline">skills.sh</a></div>'
      + '<div class="flex gap-2">'
      + '<input id="skill-install-cmd" type="text" placeholder="npx skills add https://github.com/anthropics/skills --skill frontend-design" class="flex-1 px-3 py-2 text-xs border border-border-light dark:border-border-dark rounded-lg bg-white dark:bg-surface-input-dark placeholder-gray-400 focus:outline-none focus:border-accent font-mono">'
      + '<button onclick="installSkill()" class="px-3 py-2 bg-accent text-white text-xs font-medium rounded-lg hover:bg-accent-dark transition-colors whitespace-nowrap">Install</button>'
      + '</div>'
      + '<div id="skill-install-status" class="text-[0.68rem] text-gray-400 mt-1"></div>'
      + '</div>';

    // Create new
    html += '<div class="mb-5">'
      + '<div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Create Custom Skill</div>'
      + '<button onclick="showSkillEditor()" class="w-full px-3 py-2.5 border border-dashed border-border-light dark:border-border-dark rounded-lg text-xs text-gray-500 hover:text-accent hover:border-accent transition-colors flex items-center justify-center gap-1.5">'
      + '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>'
      + 'New Skill'
      + '</button></div>';

    // Installed skills list
    html += '<div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Installed Skills (' + skills.length + ')</div>';
    if (!skills.length) {
      html += '<div class="text-xs text-gray-400 py-4 text-center">No skills installed yet. Create one or install from the community.</div>';
    } else {
      skills.forEach(function(s) {
        html += '<div class="flex items-start gap-3 p-3 rounded-xl border border-border-light dark:border-border-dark mb-2 group hover:border-accent/30 transition-colors">'
          + '<div class="flex-1 min-w-0">'
          + '<div class="flex items-center gap-2">'
          + '<span class="text-sm font-medium truncate">' + escHtml(s.name) + '</span>'
          + '<span class="text-[0.6rem] px-1.5 py-0.5 rounded-full font-medium ' + (s.enabled ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400' : 'bg-gray-100 dark:bg-gray-800 text-gray-400') + '">' + (s.enabled ? 'ON' : 'OFF') + '</span>'
          + '</div>'
          + '<div class="text-[0.7rem] text-gray-400 mt-0.5 truncate">' + escHtml(s.description) + '</div>'
          + '</div>'
          + '<div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">'
          + '<button onclick="toggleSkill(\'' + escAttr(s.dir) + '\')" class="p-1.5 rounded-lg hover:bg-surface-hover-light dark:hover:bg-surface-hover-dark" title="' + (s.enabled ? 'Disable' : 'Enable') + '">'
          + '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="' + (s.enabled ? 'M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636' : 'M5 13l4 4L19 7') + '"/></svg>'
          + '</button>'
          + '<button onclick="editSkill(\'' + escAttr(s.dir) + '\')" class="p-1.5 rounded-lg hover:bg-surface-hover-light dark:hover:bg-surface-hover-dark" title="Edit">'
          + '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>'
          + '</button>'
          + '<button onclick="deleteSkill(\'' + escAttr(s.dir) + '\')" class="p-1.5 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/30 text-gray-400 hover:text-red-500" title="Delete">'
          + '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>'
          + '</button>'
          + '</div></div>';
      });
    }

    body.innerHTML = html;
  }).catch(function(e) {
    body.innerHTML = tabHtml + '<div class="text-sm text-red-500">Failed to load skills: ' + escHtml(e.message) + '</div>';
  });
}

function installSkill() {
  var cmd = document.getElementById("skill-install-cmd").value.trim();
  if (!cmd) return;
  var status = document.getElementById("skill-install-status");
  status.textContent = "Installing… (this may take a moment)";
  status.className = "text-[0.68rem] text-accent mt-1";

  fetch("/api/skills/install", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ command: cmd })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.error) { status.textContent = "Error: " + d.error; status.className = "text-[0.68rem] text-red-500 mt-1"; }
    else { status.textContent = "✓ Installed!"; status.className = "text-[0.68rem] text-emerald-500 mt-1"; renderSkillsPanel(); loadSkillsBadge(); loadRightPanel(); }
  }).catch(function(e) { status.textContent = "Failed: " + e.message; status.className = "text-[0.68rem] text-red-500 mt-1"; });
}

function showSkillEditor(existingName, existingContent) {
  var isEdit = !!existingName;
  var body = document.getElementById("skills-panel-body");
  var defaultContent = '---\nname: my-skill\ndescription: Describe when to use this skill\n---\n\n# My Skill\n\nAdd your instructions here. The AI will follow these instructions when this skill is active.\n';

  body.innerHTML = '<div class="space-y-3">'
    + '<div class="flex items-center justify-between">'
    + '<div class="text-xs font-semibold text-gray-400 uppercase tracking-wider">' + (isEdit ? 'Edit Skill: ' + escHtml(existingName) : 'Create New Skill') + '</div>'
    + '<button onclick="renderSkillsPanel()" class="text-xs text-gray-400 hover:text-accent">← Back</button>'
    + '</div>'
    + (isEdit ? '' : '<input id="skill-editor-name" type="text" placeholder="skill-name (lowercase, hyphens)" class="w-full px-3 py-2 text-sm border border-border-light dark:border-border-dark rounded-lg bg-white dark:bg-surface-input-dark placeholder-gray-400 focus:outline-none focus:border-accent font-mono">')
    + '<textarea id="skill-editor-content" class="w-full px-4 py-3 text-xs border border-border-light dark:border-border-dark rounded-xl bg-white dark:bg-surface-input-dark font-mono leading-relaxed focus:outline-none focus:border-accent resize-none" rows="18" placeholder="SKILL.md content...">' + escHtml(existingContent || defaultContent) + '</textarea>'
    + '<div class="flex gap-2 justify-end">'
    + '<button onclick="renderSkillsPanel()" class="px-4 py-2 text-xs border border-border-light dark:border-border-dark rounded-lg hover:bg-surface-hover-light dark:hover:bg-surface-hover-dark transition-colors">Cancel</button>'
    + '<button onclick="saveSkill(' + (isEdit ? "'" + escAttr(existingName) + "'" : 'null') + ')" class="px-4 py-2 text-xs bg-accent text-white rounded-lg hover:bg-accent-dark transition-colors font-medium">' + (isEdit ? 'Save Changes' : 'Create Skill') + '</button>'
    + '</div>'
    + '<div id="skill-editor-status" class="text-[0.68rem] text-gray-400"></div>'
    + '</div>';
}

function saveSkill(existingName) {
  var content = document.getElementById("skill-editor-content").value;
  var status = document.getElementById("skill-editor-status");

  if (existingName) {
    fetch("/api/skills/" + existingName, {
      method: "PUT", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: content })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.error) { status.textContent = "Error: " + d.error; status.className = "text-[0.68rem] text-red-500"; }
      else { renderSkillsPanel(); loadSkillsBadge(); loadRightPanel(); }
    });
  } else {
    var name = document.getElementById("skill-editor-name").value.trim();
    if (!name) { status.textContent = "Name is required"; status.className = "text-[0.68rem] text-red-500"; return; }
    fetch("/api/skills", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, content: content })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.error) { status.textContent = "Error: " + d.error; status.className = "text-[0.68rem] text-red-500"; }
      else { renderSkillsPanel(); loadSkillsBadge(); loadRightPanel(); }
    });
  }
}

function editSkill(name) {
  fetch("/api/skills/" + name).then(function(r) { return r.json(); }).then(function(s) {
    showSkillEditor(name, s.content);
  });
}

function deleteSkill(name) {
  if (!confirm("Delete skill '" + name + "'?")) return;
  fetch("/api/skills/" + name, { method: "DELETE" }).then(function() {
    renderSkillsPanel(); loadSkillsBadge(); loadRightPanel();
  });
}

function toggleSkill(name) {
  fetch("/api/skills/" + name + "/toggle", { method: "POST" }).then(function() {
    renderSkillsPanel(); loadSkillsBadge(); loadRightPanel();
  });
}
</script>
</body>
</html>
