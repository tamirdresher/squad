<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Squad RC</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <button id="btn-agents" class="icon-btn" title="Agents">👥</button>
        <h1>Squad RC</h1>
      </div>
      <div class="header-right">
        <span id="status-badge" class="badge offline">●</span>
        <span id="status-text" class="status-text">Connecting...</span>
      </div>
    </header>

    <!-- Session info bar -->
    <div id="session-info" class="session-info hidden">
      <span id="info-repo" class="info-tag"></span>
      <span id="info-branch" class="info-tag"></span>
      <span id="info-machine" class="info-tag"></span>
    </div>

    <!-- Agent sidebar -->
    <aside id="agent-sidebar" class="sidebar hidden">
      <div class="sidebar-header">
        <h2>Agents</h2>
        <button id="btn-close-sidebar" class="icon-btn">✕</button>
      </div>
      <ul id="agent-list"></ul>
    </aside>

    <!-- Messages -->
    <main id="messages" class="messages"></main>

    <!-- Input -->
    <footer id="input-area">
      <form id="input-form">
        <input type="text" id="input" placeholder="Message your squad..." autocomplete="off" autocorrect="off" autocapitalize="off">
        <button type="submit" id="btn-send">↑</button>
      </form>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
